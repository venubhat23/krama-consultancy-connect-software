# IMPORTANT: This is a template file
# Replace all <BASE64_ENCODED_*> placeholders with actual base64 encoded values
# Example: echo -n "your_secret_here" | base64

apiVersion: v1
kind: Secret
metadata:
  name: rails-secrets
  namespace: insurebook
  labels:
    app: insurebook
    component: rails-app
type: Opaque
data:
  # Database credentials
  database-url: <BASE64_ENCODED_DATABASE_URL>
  postgres-password: <BASE64_ENCODED_POSTGRES_PASSWORD>

  # Redis
  redis-url: <BASE64_ENCODED_REDIS_URL>
  redis-password: <BASE64_ENCODED_REDIS_PASSWORD>

  # Rails secrets
  rails-master-key: <BASE64_ENCODED_RAILS_MASTER_KEY>
  secret-key-base: <BASE64_ENCODED_SECRET_KEY_BASE>

  # External services (if used)
  smtp-password: <BASE64_ENCODED_SMTP_PASSWORD>
  aws-access-key-id: <BASE64_ENCODED_AWS_ACCESS_KEY>
  aws-secret-access-key: <BASE64_ENCODED_AWS_SECRET_KEY>

  # JWT secrets (if used)
  jwt-secret: <BASE64_ENCODED_JWT_SECRET>

---
# TLS certificate for ingress
apiVersion: v1
kind: Secret
metadata:
  name: rails-tls-secret
  namespace: insurebook
  labels:
    app: insurebook
    component: ingress
type: kubernetes.io/tls
data:
  tls.crt: <BASE64_ENCODED_TLS_CERTIFICATE>
  tls.key: <BASE64_ENCODED_TLS_PRIVATE_KEY>

---
# Docker registry secret (if using private registry)
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-secret
  namespace: insurebook
  labels:
    app: insurebook
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <BASE64_ENCODED_DOCKER_CONFIG>

---
# Template for creating secrets using kubectl
#
# Create secrets using kubectl commands:
#
# kubectl create secret generic rails-secrets \
#   --from-literal=database-url="postgresql://user:password@host:5432/database" \
#   --from-literal=redis-url="redis://host:6379/0" \
#   --from-literal=rails-master-key="your_master_key" \
#   --namespace=insurebook
#
# kubectl create secret tls rails-tls-secret \
#   --cert=path/to/tls.crt \
#   --key=path/to/tls.key \
#   --namespace=insurebook
#
# kubectl create secret docker-registry docker-registry-secret \
#   --docker-server=registry.example.com \
#   --docker-username=username \
#   --docker-password=password \
#   --docker-email=email@example.com \
#   --namespace=insurebook